<h1>ViPER4Mac</h1>
<p>System-wide audio effects processor for macOS.</p>
<p>This installer will install:</p>
<ul>
<li><b>ViPER4Mac.app</b> to /Applications</li>
<li><b>ViPER4Mac.driver</b> to /Library/Audio/Plug-Ins/HAL</li>
</ul>
<p>The audio driver (coreaudiod) will be restarted after installation.</p>
